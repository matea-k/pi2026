<html>
<head>
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="design.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="info-box">
        <p>Current Distance:</p> <span id="distance"></span>
    </div>

    <div class="info-box">
        <p>Item Detected:</p> <span id="itemDetected"></span>
    </div>

    <div class="info-box">
        <p>Current Temperature:</p> <span id="temperature"></span>
    </div>

    <div class="info-box">
        <p>Current Humidity:</p> <span id="humidity"></span>
    </div>

    <canvas id="sensorChart"></canvas>


 <canvas id="myChart"></canvas>
<div class="graph-container">
   <script>
    const labels = ["0 s", "1 s", "2 s", "3 s", "4 s", "5 s"];
    const readings = [1,1,2,2,5];
    
    const ctx = document.getElementById("sensorChart");
    
    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Sensor Value",
                data: readings,
                borderWidth: 2,
                tension: 1 //fix later
            }]
        },
        options: {
            responsive: true
        }
    });
    </script>
  </div>
  




    
    <div class="info-box">
        <p>Alcohol:</p> <span id="alcohol"></span>
    </div>

    <button onclick="generateNumber()">BUTTON</button>

    <button onclick="get()">Get Data</button>

    <script src="generatenumber.js"></script>


    <p id="result"></p>
</body>
</html>
