<body>
    
    <div class="info-box">
        <p>Current Distance:</p> <span id="distance">0 cm</span>
    </div>

    <div class="info-box">
        <p>Item Detected:</p> <span id="itemDetected">No</span>
    </div>

    <div class="info-box">
        <p>Current Temperature:</p> <span id="temperature">0 °C</span>
    </div>

    <div class="info-box">
        <p>Current Humidity:</p> <span id="humidity">0%</span>
    </div>

    <div class="graph-container">
        <canvas id="sensorChart"></canvas>
    </div>
    
    <div class="info-box">
